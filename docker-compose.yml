# OncoIntegrate/docker-compose.yml

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: oncointegrate_backend
    command: sh -c "python manage.py migrate && python manage.py runserver 0.0.0.0:8000"
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env

    environment:
      DEBUG: ${DEBUG:-False}
      ALLOWED_HOSTS: localhost,127.0.0.1,backend

    volumes:
      - ./backend:/app
      - /app/__pycache__
    networks:
      - oncointegrate_network
    healthcheck:
      test:
        ["CMD", "curl", "-f", "http://localhost:8000/api/data-quality/summary/"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: oncointegrate_frontend
    command: npm run dev -- --host 0.0.0.0
    ports:
      - "3000:3000"
    environment:
      - VITE_API_URL=http://localhost:8000/api
      - VITE_APP_NAME=OncoIntegrate
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - oncointegrate_network

networks:
  oncointegrate_network:
    driver: bridge
